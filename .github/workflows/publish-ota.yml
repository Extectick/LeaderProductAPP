name: Publish OTA Update

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      platform:
        description: OTA platform
        required: true
        default: android
        type: choice
        options:
          - android
      runtimeVersion:
        description: Runtime version, must match app.config.ts version
        required: true
        type: string
      rolloutPercent:
        description: Rollout percent from 0 to 100
        required: true
        default: '100'
        type: string
      releaseNotes:
        description: Release notes
        required: false
        default: ''
        type: string

jobs:
  export-upload:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.channel == 'dev' && 'development' || 'production' }}

    env:
      OTA_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'prod' }}
      OTA_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'android' }}
      OTA_ROLLOUT_PERCENT: ${{ github.event_name == 'workflow_dispatch' && inputs.rolloutPercent || '100' }}
      OTA_RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.releaseNotes || 'Production OTA update' }}
      S3_ENDPOINT: ${{ secrets.BEGET_S3_ENDPOINT }}
      S3_REGION: ${{ secrets.BEGET_S3_REGION }}
      S3_BUCKET: ${{ secrets.BEGET_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.BEGET_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BEGET_S3_SECRET_ACCESS_KEY }}
      EXPO_PUBLIC_UPDATE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'prod' }}
      EXPO_PUBLIC_API_URL_DEV: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'https://api.leader-product.ru' || secrets.EXPO_PUBLIC_API_URL_DEV }}
      EXPO_PUBLIC_OTA_UPDATE_URL: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'https://api.leader-product.ru/ota/update' || format('{0}/ota/update', secrets.EXPO_PUBLIC_API_URL_DEV) }}
      EXPO_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_USERNAME }}
      EXPO_PUBLIC_MAX_BOT_USERNAME: ${{ secrets.EXPO_PUBLIC_MAX_BOT_USERNAME }}
      EXPO_PUBLIC_SENTRY_ENABLED: 'false'
      EXPO_PUBLIC_SENTRY_ENVIRONMENT: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'production' || 'development' }}
      NODE_ENV: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve runtime version
        id: version
        shell: bash
        run: |
          ACTUAL="$(node -e "console.log(require('./scripts/readNativeVersion').readVersion().versionName)")"
          EXPECTED="${{ github.event_name == 'workflow_dispatch' && inputs.runtimeVersion || '' }}"
          if [ -n "$EXPECTED" ] && [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "app.config.ts version is $ACTUAL, expected runtimeVersion $EXPECTED" >&2
            exit 1
          fi
          echo "Runtime version OK: $ACTUAL"
          echo "runtime_version=$ACTUAL" >> "$GITHUB_OUTPUT"

      - name: Export Android OTA bundle
        run: npx expo export --platform "$OTA_PLATFORM" --output-dir dist-ota

      - name: Create OTA metadata
        run: |
          node ./scripts/createOtaMetadata.js dist-ota \
            --out release-artifacts/ota-metadata.json \
            --platform "$OTA_PLATFORM" \
            --channel "$OTA_CHANNEL" \
            --runtimeVersion "${{ steps.version.outputs.runtime_version }}" \
            --rolloutPercent "$OTA_ROLLOUT_PERCENT" \
            --releaseNotes "$OTA_RELEASE_NOTES" \
            --commitSha "$GITHUB_SHA"

      - name: Upload OTA files to S3
        run: node ./scripts/uploadOtaToS3.js release-artifacts/ota-metadata.json

      - name: Upload OTA artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ota-${{ env.OTA_CHANNEL }}-${{ env.OTA_PLATFORM }}-${{ steps.version.outputs.runtime_version }}
          path: release-artifacts/
          if-no-files-found: error

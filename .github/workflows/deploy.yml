name: Build & Deploy APP

on:
  push:
    branches: [dev, main, production]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to publish/deploy'
        required: false
        default: latest
      git_ref:
        description: 'Git branch/tag/commit to checkout on the production server'
        required: false
        default: main
      deploy:
        description: 'Deploy to production after image push'
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: extectick/leaderproductapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: ${{ (github.event_name == 'release' || github.ref_name == 'main' || github.ref_name == 'production' || github.event_name == 'workflow_dispatch') && 'production' || 'development' }}
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      git_ref: ${{ steps.vars.outputs.git_ref }}
      deploy: ${{ steps.vars.outputs.deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy vars
        id: vars
        shell: bash
        run: |
          deploy=false
          git_ref="${GITHUB_REF_NAME}"
          image_tag=dev
          publish_latest=false

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            image_tag="${{ github.event.release.tag_name }}"
            git_ref="${{ github.event.release.tag_name }}"
            deploy=true
            publish_latest=true
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            image_tag="${{ inputs.image_tag }}"
            git_ref="${{ inputs.git_ref }}"
            deploy="${{ inputs.deploy }}"
            [ -n "$image_tag" ] || image_tag=latest
            [ -n "$git_ref" ] || git_ref=main
            [ "$image_tag" = "latest" ] && publish_latest=true
          elif [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "production" ]; then
            image_tag=latest
            git_ref="${GITHUB_REF_NAME}"
            deploy=true
            publish_latest=true
          fi

          {
            echo "tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAME}:${image_tag}"
            echo "${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
            if [ "$publish_latest" = "true" ] && [ "$image_tag" != "latest" ]; then
              echo "${REGISTRY}/${IMAGE_NAME}:latest"
            fi
            echo "EOF"
            echo "image_tag=$image_tag"
            echo "git_ref=$git_ref"
            echo "deploy=$deploy"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            EXPO_PUBLIC_API_URL_DEV=${{ secrets.EXPO_PUBLIC_API_URL_DEV }}
            EXPO_PUBLIC_TELEGRAM_BOT_USERNAME=${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_USERNAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    needs: build-and-push
    if: needs.build-and-push.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment: production

    steps:
      - name: Deploy production APP
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GIT_REF: ${{ needs.build-and-push.outputs.git_ref }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,GIT_REF
          script: |
            /opt/leader-deploy/deploy.sh app "$IMAGE_TAG" "$GIT_REF"

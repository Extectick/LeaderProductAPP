name: Build Android APK Release

on:
  push:
    branches: [main, production]
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      versionName:
        description: Optional safety check. Leave empty to use app.version.json.
        required: false
        default: ''
        type: string
      versionCode:
        description: Optional safety check. Leave empty to use app.version.json.
        required: false
        default: ''
        type: string
      minSupportedVersionCode:
        description: Optional override. Leave empty to use app.version.json.
        required: false
        default: ''
        type: string
      isMandatory:
        description: Force users to update
        required: true
        default: false
        type: boolean
      rolloutPercent:
        description: Rollout percent from 0 to 100
        required: true
        default: '100'
        type: string
      releaseNotes:
        description: Release notes
        required: false
        default: ''
        type: string
      buildType:
        description: Android build type
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
      architectures:
        description: React Native architectures
        required: true
        default: arm64-v8a
        type: string

jobs:
  build-upload:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.channel == 'dev' && 'development' || 'production' }}

    env:
      S3_ENDPOINT: ${{ secrets.BEGET_S3_ENDPOINT }}
      S3_REGION: ${{ secrets.BEGET_S3_REGION }}
      S3_BUCKET: ${{ secrets.BEGET_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.BEGET_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BEGET_S3_SECRET_ACCESS_KEY }}
      EXPO_PUBLIC_UPDATE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'prod' }}
      EXPO_PUBLIC_API_URL_DEV: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'https://api.leader-product.ru' || secrets.EXPO_PUBLIC_API_URL_DEV }}
      EXPO_PUBLIC_OTA_UPDATE_URL: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'https://api.leader-product.ru/ota/update' || format('{0}/ota/update', secrets.EXPO_PUBLIC_API_URL_DEV) }}
      EXPO_PUBLIC_TELEGRAM_BOT_USERNAME: ${{ secrets.EXPO_PUBLIC_TELEGRAM_BOT_USERNAME }}
      EXPO_PUBLIC_MAX_BOT_USERNAME: ${{ secrets.EXPO_PUBLIC_MAX_BOT_USERNAME }}
      EXPO_PUBLIC_SENTRY_ENABLED: 'false'
      EXPO_PUBLIC_SENTRY_ENVIRONMENT: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'production' || 'development' }}
      NODE_ENV: ${{ (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Detect APK release strategy
        id: strategy
        run: |
          node ./scripts/checkReleaseStrategy.js \
            --mode apk \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}"

      - name: Read committed native version
        id: version
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const { readVersion } = require('./scripts/readNativeVersion');
          const version = readVersion();
          const expectedName = String(process.env.EXPECTED_VERSION_NAME || '').trim();
          const expectedCode = String(process.env.EXPECTED_VERSION_CODE || '').trim();
          if (expectedName && expectedName !== version.versionName) {
            throw new Error(`workflow input versionName=${expectedName}, but app.version.json has ${version.versionName}`);
          }
          if (expectedCode && Number(expectedCode) !== version.versionCode) {
            throw new Error(`workflow input versionCode=${expectedCode}, but app.version.json has ${version.versionCode}`);
          }
          const lines = [
            `version_name=${version.versionName}`,
            `version_code=${version.versionCode}`,
            `min_supported_version_code=${version.minSupportedVersionCode}`,
          ];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${lines.join('\n')}\n`);
          console.log(`Using native version ${version.versionName} (${version.versionCode})`);
          NODE
        env:
          EXPECTED_VERSION_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.versionName || '' }}
          EXPECTED_VERSION_CODE: ${{ github.event_name == 'workflow_dispatch' && inputs.versionCode || '' }}

      - name: APK build not required
        if: ${{ steps.strategy.outputs.apk_required != 'true' }}
        run: echo "No native runtime changes detected. Skipping APK build."

      - name: Setup Java
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        run: npm ci --include=dev

      - name: Verify release version is committed
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        run: |
          node ./scripts/checkNativeVersion.js \
            --versionName "${{ steps.version.outputs.version_name }}" \
            --versionCode "${{ steps.version.outputs.version_code }}"

      - name: Generate Android native project
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Configure Gradle memory
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          if grep -q '^org.gradle.jvmargs=' gradle.properties; then
            sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8/' gradle.properties
          else
            echo 'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8' >> gradle.properties
          fi

          if grep -q '^org.gradle.workers.max=' gradle.properties; then
            sed -i 's/^org.gradle.workers.max=.*/org.gradle.workers.max=2/' gradle.properties
          else
            echo 'org.gradle.workers.max=2' >> gradle.properties
          fi

      - name: Build APK
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          BUILD_TYPE="${{ github.event_name == 'workflow_dispatch' && inputs.buildType || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew --no-daemon :app:assembleDebug -PreactNativeArchitectures="${{ github.event_name == 'workflow_dispatch' && inputs.architectures || 'arm64-v8a' }}"
          else
            ./gradlew --no-daemon :app:assembleRelease -x lintVitalRelease -x lintRelease -PreactNativeArchitectures="${{ github.event_name == 'workflow_dispatch' && inputs.architectures || 'arm64-v8a' }}"
          fi

      - name: Prepare release metadata
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          BUILD_TYPE="${{ github.event_name == 'workflow_dispatch' && inputs.buildType || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          else
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          fi

          if [ ! -f "$APK_PATH" ]; then
            echo "APK not found: $APK_PATH" >&2
            exit 1
          fi

          CHANNEL="${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'prod' }}"
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          APK_NAME="leader-product-${CHANNEL}-${VERSION_NAME}-${VERSION_CODE}.apk"
          APK_KEY="${CHANNEL}/updates/apk/${APK_NAME}"
          SHA256="$(sha256sum "$APK_PATH" | awk '{print $1}')"
          MD5="$(md5sum "$APK_PATH" | awk '{print $1}')"
          FILE_SIZE="$(stat -c%s "$APK_PATH")"

          mkdir -p release-artifacts
          cp "$APK_PATH" "release-artifacts/$APK_NAME"

          export APK_KEY SHA256 MD5 FILE_SIZE
          node - <<'NODE'
          const fs = require('node:fs');
          const metadata = {
            platform: 'android',
            channel: process.env.CHANNEL,
            versionName: process.env.VERSION_NAME,
            versionCode: Number(process.env.VERSION_CODE),
            minSupportedVersionCode: Number(process.env.MIN_SUPPORTED_VERSION_CODE),
            isMandatory: process.env.IS_MANDATORY === 'true',
            rolloutPercent: Number(process.env.ROLLOUT_PERCENT),
            isActive: true,
            releaseNotes: process.env.RELEASE_NOTES || '',
            buildType: process.env.BUILD_TYPE,
            architectures: process.env.ARCHITECTURES,
            bucket: process.env.S3_BUCKET,
            apkKey: process.env.APK_KEY,
            fileSize: Number(process.env.FILE_SIZE),
            checksum: process.env.SHA256,
            checksumMd5: process.env.MD5,
            commitSha: process.env.GITHUB_SHA,
            createdAt: new Date().toISOString(),
          };
          fs.writeFileSync('release-artifacts/release-metadata.json', JSON.stringify(metadata, null, 2));
          NODE

          echo "release_metadata_b64=$(base64 -w0 release-artifacts/release-metadata.json)" >> "$GITHUB_OUTPUT"
        env:
          CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'prod' }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          MIN_SUPPORTED_VERSION_CODE: ${{ github.event_name == 'workflow_dispatch' && inputs.minSupportedVersionCode || steps.version.outputs.min_supported_version_code }}
          IS_MANDATORY: ${{ github.event_name == 'workflow_dispatch' && inputs.isMandatory || false }}
          ROLLOUT_PERCENT: ${{ github.event_name == 'workflow_dispatch' && inputs.rolloutPercent || '100' }}
          RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && inputs.releaseNotes || format('Production Android APK {0}', steps.version.outputs.version_name) }}
          BUILD_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.buildType || 'release' }}
          ARCHITECTURES: ${{ github.event_name == 'workflow_dispatch' && inputs.architectures || 'arm64-v8a' }}

      - name: Upload APK to S3
        if: ${{ steps.strategy.outputs.apk_required == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          CHANNEL="${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'prod' }}"
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          APK_NAME="leader-product-${CHANNEL}-${VERSION_NAME}-${VERSION_CODE}.apk"
          APK_KEY="${CHANNEL}/updates/apk/$APK_NAME"

          node ./scripts/uploadApkToS3.js "release-artifacts/$APK_NAME" "$APK_KEY"

      - name: Publish production AppUpdate in API
        if: ${{ steps.strategy.outputs.apk_required == 'true' && (github.event_name != 'workflow_dispatch' || inputs.channel == 'prod') }}
        uses: appleboy/ssh-action@v1
        env:
          RELEASE_METADATA_B64: ${{ steps.metadata.outputs.release_metadata_b64 }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: RELEASE_METADATA_B64
          script: |
            set -euo pipefail
            cd /opt/leader-api/LeaderProductAPI
            git fetch origin main
            git checkout -B main origin/main
            printf '%s' "$RELEASE_METADATA_B64" | base64 -d | docker compose exec -T api sh -lc '
              set -eu
              tmp_file="$(mktemp /tmp/leader-product-apk-release.XXXXXX)"
              cat > "$tmp_file"
              node scripts/publish-apk-update-db.js "$tmp_file"
              rm -f "$tmp_file"
            '

      - name: Upload release artifacts
        if: ${{ always() && steps.strategy.outputs.apk_required == 'true' && hashFiles('release-artifacts/*') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: android-apk-${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'prod' }}-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.version_code }}
          path: release-artifacts/
          if-no-files-found: error
